name: CI

on:
  push:
    branches: [main, 'claude/**', 'feat/**', 'fix/**']
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Type-check · Lint · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: nextjs-out
          path: out/
          retention-days: 3

  lighthouse:
    name: Lighthouse CI
    needs: quality
    runs-on: ubuntu-latest
    # Only run on PRs once a Vercel preview URL is available.
    # Set LHCI_GITHUB_APP_TOKEN in repo secrets and PREVIEW_URL as an env
    # variable (injected by Vercel GitHub integration) to enable this job.
    if: ${{ github.event_name == 'pull_request' && vars.PREVIEW_URL != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: ${{ vars.PREVIEW_URL }}
          budgetPath: ./lighthouse-budget.json
          uploadArtifacts: true
